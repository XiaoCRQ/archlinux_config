# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1
    repeat_rate = 25
    repeat_delay = 250 

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat 

    touchpad {
        natural_scroll = true
    }

}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
    workspace_swipe = false
}

decoration {
    active_opacity = 0.95      # з„ҰзӮ№зӘ—еҸЈе®Ңе…ЁдёҚйҖҸжҳҺ
    inactive_opacity = 0.85    # йқһз„ҰзӮ№зӘ—еҸЈ80%дёҚйҖҸжҳҺ
}

# Startup
exec-once = fcitx5 --replace -d

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR, 1.5
env = QT_WAYLAND_FORCE_DPI,120
# env = GDK_DPI_SCALE, 1.5
